name: Deploy blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish static site to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth=1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/personal-blog-pages
          find /tmp/personal-blog-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          shopt -s dotglob
          for item in * .*; do
            case "$item" in
              .|..|.git|.github)
                continue
                ;;
            esac
            cp -R "$item" /tmp/personal-blog-pages/
          done

          cd /tmp/personal-blog-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to deploy."
          else
            git commit -m "Deploy site from ${GITHUB_SHA}"
            git push origin gh-pages
          fi
